name: Build & Push

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

env:
  IMAGE_BACKEND: ghcr.io/bktrung2003/fhg-bdp/backend
  IMAGE_FRONTEND: ghcr.io/bktrung2003/fhg-bdp/frontend

jobs:
  # ── 1. Backend Tests ────────────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run backend tests
        run: docker compose run --rm backend pytest --tb=short -q

  # ── 2. Build & Push Images ──────────────────────────────────────────────────
  build:
    needs: test-backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set image tags
        id: tags
        run: |
          SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "backend=${{ env.IMAGE_BACKEND }}:latest,${{ env.IMAGE_BACKEND }}:${VERSION}" >> $GITHUB_OUTPUT
            echo "frontend=${{ env.IMAGE_FRONTEND }}:latest,${{ env.IMAGE_FRONTEND }}:${VERSION}" >> $GITHUB_OUTPUT
          else
            echo "backend=${{ env.IMAGE_BACKEND }}:latest,${{ env.IMAGE_BACKEND }}:${SHA_SHORT}" >> $GITHUB_OUTPUT
            echo "frontend=${{ env.IMAGE_FRONTEND }}:latest,${{ env.IMAGE_FRONTEND }}:${SHA_SHORT}" >> $GITHUB_OUTPUT
          fi

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.backend }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.frontend }}
          build-args: |
            VITE_API_URL=http://localhost:8000
            NODE_ENV=production
