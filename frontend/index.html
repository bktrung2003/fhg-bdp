<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/images/favicon.png" />
    <!-- viewport-fit=cover so the app uses the full screen under iOS notch/home-bar -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover"
    />
    <title>Fusion BD CORE OS</title>

    <!-- PWA / mobile -->
    <meta name="theme-color" content="#E8913A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- iOS: launch full-screen from home screen, orange status bar -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Fusion BDP" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
