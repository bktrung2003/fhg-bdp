server {
  listen 80;
  client_max_body_size 50M;   # allow document uploads up to 50MB

  # Health probe for Docker / Portainer
  location /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # API proxy — backend runs on :8000 inside the docker network.
  # Frontend uses relative '/api/...' URLs in production so same-origin
  # cookies and CORS Just Work.
  location /api/ {
    proxy_pass         http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # OpenAPI docs (handy for testing during deploy)
  location /docs {
    proxy_pass         http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }
  location /openapi.json {
    proxy_pass         http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
  }

  # SPA static — TanStack Router uses client-side routing so unknown
  # paths fall back to index.html.
  location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    try_files $uri /index.html =404;

    # Long-cache hashed assets, no-cache the entry HTML
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|png|jpg|jpeg|gif|svg|ico|webp)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
    }
  }

  # NOTE: We intentionally do NOT include /etc/nginx/extra-conf.d/*.conf here.
  # The template ships nginx-backend-not-found.conf which defines
  # `location /api`, `/docs`, `/redoc` → return 404. That conflicts with the
  # proxy blocks above (duplicate location → nginx fails to start).
  # Since this container proxies /api + /docs to the backend directly, the
  # backend-not-found shim is not needed.
}
